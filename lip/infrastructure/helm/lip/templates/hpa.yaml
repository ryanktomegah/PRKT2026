{{- if .Values.autoscaling.enabled }}
{{/* C1 — GPU inference, scale on queue depth */}}
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "lip.fullname" . }}-c1-hpa
  namespace: {{ include "lip.namespace" . }}
  labels:
    {{- include "lip.labels" . | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "lip.fullname" . }}-c1
  minReplicas: {{ .Values.autoscaling.c1.minReplicas }}
  maxReplicas: {{ .Values.autoscaling.c1.maxReplicas }}
  metrics:
    - type: External
      external:
        metric:
          name: lip_inference_queue_depth
          selector:
            matchLabels:
              component: c1-failure-classifier
        target:
          type: AverageValue
          averageValue: {{ .Values.autoscaling.c1.queueDepthTarget | quote }}
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 120
