name: Deploy Staging (Self-Hosted)

on:
  workflow_dispatch:

concurrency:
  group: deploy-staging-self-hosted
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  deploy:
    name: Deploy to local staging
    runs-on: [self-hosted, macOS, ARM64, staging]
    environment: staging

    steps:
      - uses: actions/checkout@v4

      - name: Configure kubectl
        env:
          KUBECONFIG_CONTENT: ${{ secrets.KUBECONFIG }}
        run: |
          mkdir -p "$RUNNER_TEMP/kube"
          printf '%s' "$KUBECONFIG_CONTENT" > "$RUNNER_TEMP/kube/config"
          chmod 600 "$RUNNER_TEMP/kube/config"
          echo "KUBECONFIG=$RUNNER_TEMP/kube/config" >> "$GITHUB_ENV"
          kubectl config use-context colima

      - name: Ensure local cluster is running
        run: |
          colima start --kubernetes --save-config
          kubectl get nodes -o wide

      - name: Build local staging images
        run: |
          docker context use colima
          docker build -f lip/infrastructure/docker/Dockerfile.c4 -t lip-local-c4:${{ github.sha }} .
          docker build -f lip/infrastructure/docker/Dockerfile.c7 -t lip-local-c7:${{ github.sha }} .

      - name: Deploy staging slice
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          LIP_C4_IMAGE: lip-local-c4:${{ github.sha }}
          LIP_API_IMAGE: lip-local-c7:${{ github.sha }}
        run: |
          chmod +x ./scripts/deploy_staging_self_hosted.sh
          ./scripts/deploy_staging_self_hosted.sh lip-staging
