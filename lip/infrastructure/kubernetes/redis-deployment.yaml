# redis-deployment.yaml — Redis for LIP velocity windows
#
# Dev/staging: single-node Redis Deployment (matches docker-compose behavior)
# Prod: use ExternalName Service pointing at managed Redis (GCP Memorystore, etc.)
#
# Select mode via Helm values:
#   redis.mode: standalone   → deploys this Deployment + ClusterIP Service
#   redis.mode: external     → deploys ExternalName Service only (no Deployment)
#
# For dev/staging (standalone mode):
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: lip-redis
  namespace: lip
  labels:
    app: lip-redis
    component: redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: lip-redis
  template:
    metadata:
      labels:
        app: lip-redis
        component: redis
    spec:
      containers:
        - name: redis
          image: redis:7.2-alpine
          ports:
            - containerPort: 6379
              name: redis
          args:
            - redis-server
            - --requirepass
            - $(REDIS_PASSWORD)
            - --save
            - ""          # disable persistence in dev/staging (stateless)
            - --loglevel
            - warning
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: lip-redis-secret
                  key: password
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            exec:
              command: ["redis-cli", "-a", "$(REDIS_PASSWORD)", "ping"]
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            exec:
              command: ["redis-cli", "-a", "$(REDIS_PASSWORD)", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: lip
  labels:
    app: lip-redis
    component: redis
spec:
  selector:
    app: lip-redis
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
  type: ClusterIP
