# redpanda-statefulset.yaml — Redpanda (Kafka-compatible) for LIP event streaming
#
# Dev/staging: single-node Redpanda StatefulSet (--mode=dev-container, no TLS)
# Prod: ExternalName Service pointing at bank-managed Kafka
#
# Select mode via Helm values:
#   redpanda.mode: standalone  → deploys this StatefulSet + ClusterIP Service
#   redpanda.mode: external    → deploys ExternalName Service only
#
# PRODUCTION KAFKA CONFIGURATION (required for bank pilot):
#   The bank's Kafka cluster must be configured with:
#     - TLS: KAFKA_SECURITY_PROTOCOL=SSL (or SASL_SSL)
#     - SASL: SCRAM-SHA-512 recommended (SASL_MECHANISM=SCRAM-SHA-512)
#     - ACLs: LIP service account needs read/write on lip.* topics only
#     - Certificates: CA cert, client cert, client key mounted as secrets
#   C5 StatefulSet already sets KAFKA_SECURITY_PROTOCOL=SSL (see c5-deployment.yaml:124).
#   When connecting to external Kafka, ensure all producers/consumers use the same
#   TLS config via environment variables:
#     KAFKA_BOOTSTRAP_SERVERS, KAFKA_SECURITY_PROTOCOL, KAFKA_SSL_CAFILE,
#     KAFKA_SSL_CERTFILE, KAFKA_SSL_KEYFILE, KAFKA_SASL_MECHANISM, KAFKA_SASL_USERNAME
#   These should be sourced from External Secrets Operator (lip/kafka secret).
#
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: lip-redpanda
  namespace: lip
  labels:
    app: lip-redpanda
    component: redpanda
spec:
  serviceName: lip-redpanda-headless
  replicas: 1
  selector:
    matchLabels:
      app: lip-redpanda
  template:
    metadata:
      labels:
        app: lip-redpanda
        component: redpanda
    spec:
      containers:
        - name: redpanda
          image: docker.redpanda.com/redpandadata/redpanda:v23.3.9
          command:
            - redpanda
            - start
            - --kafka-addr=internal://0.0.0.0:9092,external://0.0.0.0:9093
            - --advertise-kafka-addr=internal://redpanda:9092,external://localhost:9093
            - --pandaproxy-addr=internal://0.0.0.0:8082,external://0.0.0.0:8083
            - --schema-registry-addr=internal://0.0.0.0:8081
            - --rpc-addr=redpanda:33145
            - --advertise-rpc-addr=redpanda:33145
            - --mode=dev-container
            - --smp=1
            - --memory=512M
            - --reserve-memory=0M
            - --overprovisioned
            - --node-id=0
            - --check=false
          ports:
            - containerPort: 9092
              name: kafka-internal
            - containerPort: 9093
              name: kafka-external
            - containerPort: 8081
              name: schema-registry
            - containerPort: 8082
              name: pandaproxy
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
          livenessProbe:
            exec:
              command: ["rpk", "cluster", "health"]
            initialDelaySeconds: 30
            periodSeconds: 15
          readinessProbe:
            exec:
              command: ["rpk", "cluster", "health"]
            initialDelaySeconds: 20
            periodSeconds: 10
          volumeMounts:
            - name: redpanda-data
              mountPath: /var/lib/redpanda/data
  volumeClaimTemplates:
    - metadata:
        name: redpanda-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 5Gi
---
# Headless service for StatefulSet DNS
apiVersion: v1
kind: Service
metadata:
  name: lip-redpanda-headless
  namespace: lip
  labels:
    app: lip-redpanda
spec:
  clusterIP: None
  selector:
    app: lip-redpanda
  ports:
    - name: kafka-internal
      port: 9092
---
# Named service for Kafka bootstrap (C5 worker connects to redpanda:9092)
apiVersion: v1
kind: Service
metadata:
  name: redpanda
  namespace: lip
  labels:
    app: lip-redpanda
    component: redpanda
spec:
  selector:
    app: lip-redpanda
  ports:
    - name: kafka
      port: 9092
      targetPort: 9092
    - name: schema-registry
      port: 8081
      targetPort: 8081
  type: ClusterIP
