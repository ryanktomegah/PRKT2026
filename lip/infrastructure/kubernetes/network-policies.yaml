# Namespace definition with Pod Security Standards (PSS)
# Enforces restricted profile: no root, no privilege escalation, no host namespaces.
apiVersion: v1
kind: Namespace
metadata:
  name: lip
  labels:
    name: lip
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/enforce-version: latest
    pod-security.kubernetes.io/audit: restricted
    pod-security.kubernetes.io/warn: restricted
---
# Network Policies — Zero outbound for C4 (Dispute Classifier) and C7 (Execution Agent)
# Architecture Spec: Bank-side containers must have zero outbound network access
---
# C4 Dispute Classifier — zero outbound
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: lip-c4-zero-outbound
  namespace: lip
spec:
  podSelector:
    matchLabels:
      component: c4-dispute-classifier
  policyTypes:
    - Egress
    - Ingress
  ingress:
    # Allow inbound from C7 execution agent only
    - from:
        - podSelector:
            matchLabels:
              component: c7-execution-agent
      ports:
        - protocol: TCP
          port: 8080
  egress:
    # NO egress rules = zero outbound traffic allowed
    []
---
# C7 Execution Agent — zero outbound
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: lip-c7-zero-outbound
  namespace: lip
spec:
  podSelector:
    matchLabels:
      component: c7-execution-agent
  policyTypes:
    - Egress
    - Ingress
  ingress:
    # Allow inbound from internal LIP components only
    - from:
        - namespaceSelector:
            matchLabels:
              name: lip
      ports:
        - protocol: TCP
          port: 8080
  egress:
    # Allow only intra-namespace traffic (Redis, decision log storage)
    - to:
        - namespaceSelector:
            matchLabels:
              name: lip
        - podSelector:
            matchLabels:
              app: lip-redis
      ports:
        - protocol: TCP
          port: 6380
    # Allow DNS resolution (required for service discovery)
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53
---
# C1 Classifier — allow GPU node pool + internal only
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: lip-c1-internal-only
  namespace: lip
spec:
  podSelector:
    matchLabels:
      component: c1-failure-classifier
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              name: lip
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              name: lip
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53
---
# C3 Repayment Engine — internal + Redis egress only
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: lip-c3-internal-only
  namespace: lip
spec:
  podSelector:
    matchLabels:
      component: c3-repayment-engine
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow inbound from orchestrator / pipeline components
    - from:
        - namespaceSelector:
            matchLabels:
              name: lip
      ports:
        - protocol: TCP
          port: 8080
  egress:
    # Allow Redis for UETR deduplication + settlement state
    - to:
        - podSelector:
            matchLabels:
              app: lip-redis
      ports:
        - protocol: TCP
          port: 6379
        - protocol: TCP
          port: 6380
    # Allow intra-namespace for component communication
    - to:
        - namespaceSelector:
            matchLabels:
              name: lip
    # Allow DNS resolution
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53
---
# C6 AML Velocity — internal + Redis egress only
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: lip-c6-internal-only
  namespace: lip
spec:
  podSelector:
    matchLabels:
      component: c6-aml-velocity
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow inbound from orchestrator / pipeline components
    - from:
        - namespaceSelector:
            matchLabels:
              name: lip
      ports:
        - protocol: TCP
          port: 8080
  egress:
    # Allow Redis for velocity windows + salt state
    - to:
        - podSelector:
            matchLabels:
              app: lip-redis
      ports:
        - protocol: TCP
          port: 6379
        - protocol: TCP
          port: 6380
    # Allow intra-namespace for component communication
    - to:
        - namespaceSelector:
            matchLabels:
              name: lip
    # Allow DNS resolution
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53
---
# Default deny all for lip namespace (baseline)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: lip-default-deny-all
  namespace: lip
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
