# redis-deployment.yaml — Redis for LIP velocity windows
#
# Dev/staging: single-node Redis Deployment (matches docker-compose behavior)
# Prod: use ExternalName Service pointing at managed Redis (GCP Memorystore, etc.)
#
# Select mode via Helm values:
#   redis.mode: standalone   → deploys this Deployment + ClusterIP Service
#   redis.mode: external     → deploys ExternalName Service only (no Deployment)
#
# TLS: standalone Redis listens on port 6380 with TLS when lip-redis-tls-secret
# is provisioned. Without the TLS secret, falls back to port 6379 (plaintext).
# Production MUST use TLS — either managed Redis (GCP Memorystore TLS) or
# standalone with cert-manager-issued certificates.
#
# For dev/staging (standalone mode):
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: lip-redis
  namespace: lip
  labels:
    app: lip-redis
    component: redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: lip-redis
  template:
    metadata:
      labels:
        app: lip-redis
        component: redis
    spec:
      containers:
        - name: redis
          image: redis:7.2-alpine
          ports:
            - containerPort: 6380
              name: redis-tls
          args:
            - redis-server
            - --requirepass
            - $(REDIS_PASSWORD)
            - --save
            - ""          # disable persistence in dev/staging (stateless)
            - --loglevel
            - warning
            # TLS configuration — requires lip-redis-tls-secret with tls.crt, tls.key, ca.crt
            - --tls-port
            - "6380"
            - --tls-cert-file
            - /tls/tls.crt
            - --tls-key-file
            - /tls/tls.key
            - --tls-ca-cert-file
            - /tls/ca.crt
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: lip-redis-secret
                  key: password
          volumeMounts:
            - name: redis-tls
              mountPath: /tls
              readOnly: true
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            exec:
              command: ["redis-cli", "--tls", "--cert", "/tls/tls.crt", "--key", "/tls/tls.key", "--cacert", "/tls/ca.crt", "-p", "6380", "-a", "$(REDIS_PASSWORD)", "ping"]
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            exec:
              command: ["redis-cli", "--tls", "--cert", "/tls/tls.crt", "--key", "/tls/tls.key", "--cacert", "/tls/ca.crt", "-p", "6380", "-a", "$(REDIS_PASSWORD)", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 5
          securityContext:
            runAsNonRoot: true
            runAsUser: 999
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
      volumes:
        - name: redis-tls
          secret:
            secretName: lip-redis-tls-secret
            optional: false
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: lip
  labels:
    app: lip-redis
    component: redis
spec:
  selector:
    app: lip-redis
  ports:
    - name: redis-tls
      port: 6380
      targetPort: 6380
  type: ClusterIP
