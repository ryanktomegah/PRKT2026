{{/*
secrets.yaml — ExternalSecret resources for LIP.

Uses External Secrets Operator (https://external-secrets.io/) to sync secrets
from a cloud provider (AWS Secrets Manager, GCP Secret Manager, or HashiCorp Vault)
into native Kubernetes Secrets consumed by component pods.

Install ESO first:
  helm install external-secrets external-secrets/external-secrets -n external-secrets-system

Set .Values.secrets.provider and ARN/path values before deploying.
*/}}
---
# SecretStore — points to the cloud provider backend
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: lip-secret-store
  namespace: {{ include "lip.namespace" . }}
  labels:
    {{- include "lip.labels" . | nindent 4 }}
spec:
  provider:
    {{- if eq .Values.secrets.provider "aws" }}
    aws:
      service: SecretsManager
      region: us-east-1
      auth:
        jwt:
          serviceAccountRef:
            name: lip-secrets-sa
    {{- else if eq .Values.secrets.provider "gcp" }}
    gcpsm:
      projectID: lip-prod
      auth:
        workloadIdentity:
          clusterLocation: us-central1
          clusterName: lip-cluster
          serviceAccountRef:
            name: lip-secrets-sa
    {{- else if eq .Values.secrets.provider "vault" }}
    vault:
      server: {{ .Values.secrets.vaultServer | quote }}
      path: {{ .Values.secrets.vaultPath | quote }}
      version: "v2"
      auth:
        kubernetes:
          mountPath: kubernetes
          role: lip-secrets
          serviceAccountRef:
            name: lip-secrets-sa
    {{- end }}
---
# Redis credentials (URL for C3/C6 stateful components)
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: lip-redis-secret
  namespace: {{ include "lip.namespace" . }}
  labels:
    {{- include "lip.labels" . | nindent 4 }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: lip-secret-store
    kind: SecretStore
  target:
    name: lip-redis-secret
    creationPolicy: Owner
  data:
    - secretKey: url
      remoteRef:
        key: {{ .Values.secrets.redisSecretArn | default "lip/redis/url" | quote }}
        property: url
---
# License key (all components)
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: lip-license-secret
  namespace: {{ include "lip.namespace" . }}
  labels:
    {{- include "lip.labels" . | nindent 4 }}
spec:
  refreshInterval: 24h
  secretStoreRef:
    name: lip-secret-store
    kind: SecretStore
  target:
    name: lip-license-secret
    creationPolicy: Owner
  data:
    - secretKey: token_json
      remoteRef:
        key: {{ .Values.secrets.licenseSecretArn | default "lip/license/token" | quote }}
        property: token_json
    - secretKey: key_hex
      remoteRef:
        key: {{ .Values.secrets.licenseSecretArn | default "lip/license/token" | quote }}
        property: key_hex
---
# AML salt (C6 — current and previous for 30-day overlap rotation)
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: lip-aml-secret
  namespace: {{ include "lip.namespace" . }}
  labels:
    {{- include "lip.labels" . | nindent 4 }}
spec:
  # Refresh every hour — salt rotation happens annually but we want fast propagation
  refreshInterval: 1h
  secretStoreRef:
    name: lip-secret-store
    kind: SecretStore
  target:
    name: lip-aml-secret
    creationPolicy: Owner
  data:
    - secretKey: current_salt
      remoteRef:
        key: {{ .Values.secrets.amlSecretArn | default "lip/aml/salts" | quote }}
        property: current_salt
    - secretKey: previous_salt
      remoteRef:
        key: {{ .Values.secrets.amlSecretArn | default "lip/aml/salts" | quote }}
        property: previous_salt
