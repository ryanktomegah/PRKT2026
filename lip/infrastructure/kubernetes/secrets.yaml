# LIP Kubernetes Secrets — External Secrets Operator pattern
#
# These resources sync secrets from a cloud KMS/secrets manager into
# native K8s Secrets consumed by component pods.
#
# Prerequisites:
#   helm install external-secrets external-secrets/external-secrets \
#     -n external-secrets-system --create-namespace
#
# Then set the correct ARNs/paths below and apply:
#   kubectl apply -f secrets.yaml
#
# For local development without ESO, create the secrets manually:
#   kubectl -n lip create secret generic lip-redis-secret \
#     --from-literal=url=redis://localhost:6380
#   kubectl -n lip create secret generic lip-license-secret \
#     --from-literal=token_json='{}' --from-literal=key_hex='deadbeef'
#   kubectl -n lip create secret generic lip-aml-secret \
#     --from-literal=current_salt=$(openssl rand -hex 32) \
#     --from-literal=previous_salt=$(openssl rand -hex 32)
---
# SecretStore — AWS Secrets Manager (change provider for GCP/Vault)
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: lip-secret-store
  namespace: lip
spec:
  provider:
    aws:
      service: SecretsManager
      region: us-east-1
      # IRSA: annotate the service account with the IAM role ARN
      auth:
        jwt:
          serviceAccountRef:
            name: lip-secrets-sa
---
# ServiceAccount for IRSA (AWS IAM Roles for Service Accounts)
apiVersion: v1
kind: ServiceAccount
metadata:
  name: lip-secrets-sa
  namespace: lip
  annotations:
    # Replace with the actual IAM role ARN that has read access to lip/* secrets
    eks.amazonaws.com/role-arn: "arn:aws:iam::ACCOUNT_ID:role/lip-secrets-reader"
---
# Redis URL (used by C3 repayment engine and C6 AML velocity)
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: lip-redis-secret
  namespace: lip
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: lip-secret-store
    kind: SecretStore
  target:
    name: lip-redis-secret
    creationPolicy: Owner
  data:
    - secretKey: url
      remoteRef:
        key: "lip/redis"
        property: url
---
# License token (all components — validated at boot by C8 LicenseBootValidator)
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: lip-license-secret
  namespace: lip
spec:
  refreshInterval: 24h
  secretStoreRef:
    name: lip-secret-store
    kind: SecretStore
  target:
    name: lip-license-secret
    creationPolicy: Owner
  data:
    - secretKey: token_json
      remoteRef:
        key: "lip/license"
        property: token_json
    - secretKey: key_hex
      remoteRef:
        key: "lip/license"
        property: key_hex
---
# AML salt (C6 — dual-salt for 30-day rotation overlap per CIPHER spec)
# Refreshed every hour to pick up automated salt rotations promptly.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: lip-aml-secret
  namespace: lip
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: lip-secret-store
    kind: SecretStore
  target:
    name: lip-aml-secret
    creationPolicy: Owner
  data:
    - secretKey: current_salt
      remoteRef:
        key: "lip/aml/salts"
        property: current_salt
    - secretKey: previous_salt
      remoteRef:
        key: "lip/aml/salts"
        property: previous_salt
