name: LIP CI

on:
  push:
    branches: ["main", "claude/*", "codex/*", "feature/*", "fix/*"]
  pull_request:
    branches: ["main"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Upgrade pip and build tools
        run: pip install --upgrade pip setuptools>=68 wheel

      - name: Install core dependencies
        run: pip install -r requirements.txt

      - name: Install ML + dev dependencies
        run: pip install -r requirements-ml.txt

      - name: Install LIP package (editable)
        working-directory: lip
        run: pip install -e .

      - name: Run tests
        run: |
          PYTHONPATH=. python -m pytest lip/tests/ \
            --tb=short \
            -q \
            -x
        # test_e2e_pipeline.py uses in-memory mocks — no live Redis/Kafka required

      - name: Run tests with coverage (3.11 only)
        if: matrix.python-version == '3.11'
        run: |
          PYTHONPATH=. python -m pytest lip/tests/ \
            --tb=short \
            --cov=lip \
            --cov-report=term-missing \
            --cov-fail-under=75 \
            -q

  integrity-check:
    name: Integrity Shield checks
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Upgrade pip
        run: pip install --upgrade pip setuptools>=68 wheel
      - name: Install dependencies
        run: |
          pip install -r requirements.txt -r requirements-ml.txt
          (cd lip && pip install -e .)
      - name: Run integrity tests
        run: |
          PYTHONPATH=. python -m pytest lip/tests/test_integrity_*.py \
            --tb=short -v
      - name: OSS attribution + GPL contamination check
        run: |
          PYTHONPATH=. python - <<'PY'
          from lip.integrity.oss_tracker import OSSAttributionRegistry
          reg = OSSAttributionRegistry()
          records = reg.scan_installed_packages()
          gpl = reg.check_gpl_contamination(records)
          if gpl:
              print(f"FAIL: GPL contamination: {[r.package_name for r in gpl]}")
              raise SystemExit(1)
          print(f"OK: scanned {len(records)} packages, no GPL contamination")
          PY

  train-smoke:
    name: Training smoke-test (C1 + C2 + C6)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install dependencies
        run: |
          pip install --upgrade pip setuptools>=68 wheel
          pip install -r requirements.txt -r requirements-ml.txt
          cd lip && pip install -e .
      - name: Run DGEN smoke-test (C1 + C2 + C3 + C6)
        run: |
          PYTHONPATH=. python -m lip.dgen.generate_all \
            --output-dir /tmp/lip_smoke_corpus \
            --components c1 c2 c3 c6 \
            --smoke-test
      - name: Run train_all smoke-test (C1 + C2 + C6)
        run: |
          PYTHONPATH=. python -m lip.train_all \
            --corpus-dir /tmp/lip_smoke_corpus \
            --output-dir /tmp/lip_smoke_models \
            --components c1 c2 c6 \
            --smoke-test
      - name: Verify all model artifacts saved
        run: |
          python - <<'EOF'
          import json, sys
          from pathlib import Path
          model_dir = Path("/tmp/lip_smoke_models")
          required = [
              "c1_model.pkl", "c1_threshold.txt", "c1_embeddings.pkl",
              "c1_training_report.json",
              "c2_model.pkl", "c2_training_report.json",
              "c6_anomaly_detector.pkl", "c6_training_report.json",
              "training_summary.json", "model_card.json",
          ]
          missing = [f for f in required if not (model_dir / f).exists()]
          if missing:
              print(f"FAIL: missing artifacts: {missing}", file=sys.stderr)
              sys.exit(1)
          summary = json.loads((model_dir / "training_summary.json").read_text())
          if summary["overall"] != "PASS":
              print(f"FAIL: training_summary overall={summary['overall']}", file=sys.stderr)
              sys.exit(1)
          print(f"OK: all {len(required)} artifacts present, overall=PASS")
          EOF

  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - run: pip install ruff>=0.3.0
      - name: Run ruff
        run: ruff check lip/ --output-format=github

  typecheck:
    name: Type check (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install dependencies
        run: |
          pip install --upgrade pip setuptools>=68 wheel
          pip install -r requirements.txt -r requirements-ml.txt
          pip install mypy>=1.8.0 types-PyYAML
          cd lip && pip install -e .
      - name: Run mypy
        run: mypy lip/ --ignore-missing-imports --no-strict-optional

  go-build:
    name: Go Build & Test (C5 consumer)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true
          cache-dependency-path: lip/c5_streaming/go_consumer/go.sum

      - name: Install librdkafka (confluent-kafka-go CGO dep)
        run: |
          sudo apt-get update
          sudo apt-get install -y librdkafka-dev

      - name: Download Go modules
        working-directory: lip/c5_streaming/go_consumer
        run: go mod download

      - name: Build Go consumer
        working-directory: lip/c5_streaming/go_consumer
        run: CGO_ENABLED=1 go build -v ./...

      - name: Run Go unit tests
        working-directory: lip/c5_streaming/go_consumer
        run: |
          CGO_ENABLED=1 go test -v -count=1 \
            -run "TestNormalize|TestLoadConfig|TestKafka|TestSSL" \
            ./...

  go-build-c7:
    name: Go Build & Test (C7 offer router)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true
          cache-dependency-path: lip/c7_execution_agent/go_offer_router/go.sum

      - name: Download Go modules
        working-directory: lip/c7_execution_agent/go_offer_router
        run: go mod download

      - name: Build Go offer router
        working-directory: lip/c7_execution_agent/go_offer_router
        run: go build -v ./...

      - name: Run Go unit tests
        working-directory: lip/c7_execution_agent/go_offer_router
        run: |
          go test -v -count=1 \
            -run "TestOffer|TestConfig|TestKillSwitch|TestExpiry|TestAccept|TestReject|TestCancel|TestQuery|TestHealth|TestConcurrent" \
            ./...

  rust-build-c6:
    name: Rust Build & Test (C6 velocity/sanctions)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
        with:
          toolchain: stable

      - name: Cache Rust build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            lip/c6_aml_velocity/rust_velocity/target
          key: rust-c6-${{ hashFiles('lip/c6_aml_velocity/rust_velocity/Cargo.toml') }}
          restore-keys: rust-c6-

      - name: Run Rust unit tests (C6)
        working-directory: lip/c6_aml_velocity/rust_velocity
        run: cargo test --all-targets

      - name: Build Rust release (verify compilation)
        working-directory: lip/c6_aml_velocity/rust_velocity
        run: cargo build --release

      - name: Set up Python 3.11 for PyO3 wheel build
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install maturin
        run: pip install "maturin>=1.0,<2.0"

      - name: Build PyO3 wheel (C6)
        working-directory: lip/c6_aml_velocity/rust_velocity
        run: maturin build --release

      - name: Install wheel and verify Python import
        working-directory: lip/c6_aml_velocity/rust_velocity
        run: |
          pip install target/wheels/*.whl --force-reinstall
          python -c "import lip_c6_rust_velocity; hc = lip_c6_rust_velocity.health_check(); assert hc['ok'], f'Health check failed: {hc}'; print('OK:', hc)"

      - name: Install LIP package and run C6 Python tests with Rust wheel
        run: |
          pip install --upgrade pip setuptools>=68 wheel
          pip install -r requirements.txt -r requirements-ml.txt
          (cd lip && pip install -e .)
          PYTHONPATH=. python -m pytest lip/tests/test_c6_rust_velocity.py \
            lip/tests/test_c6_aml.py \
            lip/tests/test_c6_tenant_velocity.py \
            -v --tb=short -q

