# HPA for C7 Execution Agent (queue depth — loan offer decisions)
# Conservative: kill-switch state must be consistent; limit scale-up speed.
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: lip-c7-execution-hpa
  namespace: lip
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: lip-c7-execution
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: External
      external:
        metric:
          name: lip_inference_queue_depth
          selector:
            matchLabels:
              component: c7-execution-agent
        target:
          type: AverageValue
          averageValue: "30"
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 600
      policies:
        - type: Pods
          value: 1
          periodSeconds: 180
