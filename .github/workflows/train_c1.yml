name: Train C1 (Full)

# Manual trigger only — generates 10M-record corpus via production pipeline,
# then trains C1 on a 2M sample via train_c1_on_parquet.py.
#
# Runner: ubuntu-latest (7 GB RAM, 2 vCPU, ~14 GB disk)
# Memory budget:
#   - 10M parquet generation: ~5.4 GB peak RAM, ~620 MB disk
#   - 2M training sample: ~2 GB feature matrix + model
#   - If OOM: reduce n_payments to 1000000 (→ 5M corpus, ~2.7 GB peak)
#
# Expected runtime: ~75 min (15 min generation + 60 min training)
on:
  workflow_dispatch:
    inputs:
      n_payments:
        description: "RJCT records to generate (total corpus = n_payments × 5)"
        required: false
        default: "2000000"
      sample_n:
        description: "Records to sample from corpus for training"
        required: false
        default: "2000000"
      n_epochs:
        description: "Joint training epochs (20 = ~60 min on 2M samples)"
        required: false
        default: "20"
      seed:
        description: "Random seed"
        required: false
        default: "42"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  train-c1:
    name: "C1 Training (n=${{ github.event.inputs.n_payments }}×5, sample=${{ github.event.inputs.sample_n }}, epochs=${{ github.event.inputs.n_epochs }})"
    runs-on: ubuntu-latest
    timeout-minutes: 340   # 5h40m — hard ceiling before GitHub's 6h kill

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip "setuptools>=68" wheel
          pip install numpy scikit-learn "torch>=2.6.0" lightgbm pyarrow mlflow
          cd lip && pip install -e .

      - name: Verify imports
        run: |
          PYTHONPATH=. python -c "
          from lip.c1_failure_classifier.training import TrainingPipeline
          from lip.c1_failure_classifier.training_torch import TrainingPipelineTorch
          from lip.dgen.run_production_pipeline import run_pipeline
          print('All imports OK')
          "

      - name: Generate 10M corpus via production pipeline
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          # Exit code 1 = validation warnings (e.g. χ² overly sensitive at 10M scale)
          # Exit code 2 = generation failure (fatal)
          # We accept exit code 1 since the corpus is usable for training.
          set +e
          python -m lip.dgen.run_production_pipeline \
            --n-payments ${{ github.event.inputs.n_payments }} \
            --output-dir artifacts/production_data \
            --seed ${{ github.event.inputs.seed }}
          EXIT_CODE=$?
          set -e
          if [ $EXIT_CODE -eq 2 ]; then
            echo "FATAL: Corpus generation failed"
            exit 2
          elif [ $EXIT_CODE -eq 1 ]; then
            echo "WARNING: Statistical validation had warnings (expected at 10M scale). Corpus is usable."
          fi
          echo "=== Corpus files ==="
          ls -lh artifacts/production_data/payments_synthetic.parquet
          ls -lh artifacts/production_data/synthesis_parameters.json

      - name: Train C1 on parquet
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          python scripts/train_c1_on_parquet.py \
            --parquet artifacts/production_data/payments_synthetic.parquet \
            --sample ${{ github.event.inputs.sample_n }} \
            --epochs ${{ github.event.inputs.n_epochs }} \
            --seed ${{ github.event.inputs.seed }} \
            --output-dir artifacts/c1_trained

      - name: Training summary and baseline comparison
        run: |
          python - <<'PYEOF'
          import json, sys
          from pathlib import Path

          metrics_path = Path("artifacts/c1_trained/train_metrics_parquet.json")
          if not metrics_path.exists():
              print("ERROR: train_metrics_parquet.json not found — training may have failed")
              sys.exit(1)

          m = json.loads(metrics_path.read_text())

          # Baseline from previous training run (1M samples, 12 corridors, no temporal clustering)
          baseline_auc = 0.8871
          baseline_f2 = 0.6245
          auc_delta = m["val_auc"] - baseline_auc
          f2_delta = m["f2_score"] - baseline_f2

          # Read threshold from file
          thresh_path = Path("artifacts/c1_trained/f2_threshold.txt")
          threshold = thresh_path.read_text().strip() if thresh_path.exists() else str(m["f2_threshold"])

          summary = f"""
          ═══════════════════════════════════════════════════
            C1 TRAINING COMPLETE
            ─────────────────────
            Records:     {m['n_records']:,} (sampled from {int('${{ github.event.inputs.n_payments }}') * 5:,} corpus)
            Corridors:   20
            Val AUC:     {m['val_auc']:.4f} (baseline: {baseline_auc}, Δ={auc_delta:+.4f})
            F2 score:    {m['f2_score']:.4f} (baseline: {baseline_f2}, Δ={f2_delta:+.4f})
            F2 threshold: {threshold}
            ECE pre:     {m.get('ece_pre_calibration', 'N/A')}
            ECE post:    {m.get('ece_post_calibration', m['ece']):.4f}

            ACTION REQUIRED:
            Update lip/pipeline.py line 64:
              FAILURE_PROBABILITY_THRESHOLD: float = {threshold}
          ═══════════════════════════════════════════════════
          """
          print(summary)

          if m["val_auc"] < baseline_auc:
              print("⚠ WARNING: AUC regressed below baseline. Review before deploying.")
          PYEOF

      - name: Verify artifacts
        run: |
          echo "=== C1 Trained Artifacts ==="
          ls -lh artifacts/c1_trained/ 2>/dev/null || echo "WARNING: no artifacts found"
          echo ""
          echo "=== Metrics ==="
          cat artifacts/c1_trained/train_metrics_parquet.json 2>/dev/null
          echo ""
          echo "=== F2 Threshold ==="
          cat artifacts/c1_trained/f2_threshold.txt 2>/dev/null

      - name: Upload model artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: c1-parquet-n${{ github.event.inputs.n_payments }}-sample${{ github.event.inputs.sample_n }}-ep${{ github.event.inputs.n_epochs }}-seed${{ github.event.inputs.seed }}
          path: |
            artifacts/c1_trained/c1_model_parquet.pt
            artifacts/c1_trained/c1_lgbm_parquet.pkl
            artifacts/c1_trained/c1_calibrator.pkl
            artifacts/c1_trained/c1_scaler.pkl
            artifacts/c1_trained/train_metrics_parquet.json
            artifacts/c1_trained/f2_threshold.txt
            artifacts/production_data/synthesis_parameters.json
            artifacts/production_data/data_card.json
          retention-days: 7
