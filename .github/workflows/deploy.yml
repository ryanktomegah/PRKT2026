name: Deploy (Helm)

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options: [dev, staging, prod]
      image_tag:
        description: "Image tag to deploy (e.g. sha-abc1234 or v1.2.0)"
        required: true
        default: "latest"

concurrency:
  group: deploy-${{ inputs.environment }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to ${{ inputs.environment }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v3
        with:
          version: "3.14.0"

      - name: Configure kubectl
        uses: azure/k8s-set-context@v3
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBECONFIG }}

      - name: Helm upgrade — ${{ inputs.environment }}
        run: |
          helm upgrade --install lip ./lip/infrastructure/helm/lip \
            --namespace lip \
            --create-namespace \
            --values lip/infrastructure/helm/lip/values-${{ inputs.environment }}.yaml \
            --set image.tag=${{ inputs.image_tag }} \
            --set image.registry=ghcr.io/${{ github.repository_owner }} \
            --atomic \
            --timeout 10m \
            --wait

      - name: Verify rollout
        run: |
          kubectl rollout status deployment/lip-c1-classifier -n lip --timeout=5m
          kubectl rollout status deployment/lip-c6-aml         -n lip --timeout=5m
          kubectl rollout status deployment/lip-c7-execution   -n lip --timeout=5m
