name: Train C1 (Full)

# Manual trigger only — full training takes 2-5h, not suitable for every push.
# Run from: GitHub → Actions → "Train C1 (Full)" → Run workflow
on:
  workflow_dispatch:
    inputs:
      n_epochs:
        description: "Joint training epochs (20 = ~2.5h safe, 50 = ~5.4h risky)"
        required: false
        default: "20"
      seed:
        description: "Random seed"
        required: false
        default: "42"

jobs:
  train-c1:
    name: C1 Full Training (${{ github.event.inputs.n_epochs }} epochs)
    runs-on: ubuntu-latest
    timeout-minutes: 340   # 5h40m — hard ceiling before GitHub's 6h kill

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install numpy scipy scikit-learn
          cd lip && pip install -e .

      - name: Verify corpus exists
        run: |
          CORPUS=artifacts/synthetic/c1_corpus_n100000_seed${{ github.event.inputs.seed }}.json
          if [ ! -f "$CORPUS" ]; then
            echo "Corpus not found at $CORPUS — regenerating..."
            PYTHONPATH=. python -m lip.dgen.generate_all \
              --output-dir artifacts/synthetic \
              --components c1 \
              --seed ${{ github.event.inputs.seed }}
          else
            echo "Corpus found: $CORPUS ($(wc -c < $CORPUS | numfmt --to=iec))"
          fi

      - name: Patch TrainingConfig for epoch count
        run: |
          # Override n_epochs in _train_c1 via environment — train_all.py reads
          # smoke_test flag; for full run we patch via a small wrapper script.
          cat > /tmp/run_c1_train.py << 'EOF'
          import sys, os
          sys.path.insert(0, ".")
          import json, pickle, time
          from pathlib import Path
          from lip.c1_failure_classifier.training import TrainingConfig, TrainingPipeline

          n_epochs = int(os.environ.get("C1_N_EPOCHS", "20"))
          seed     = int(os.environ.get("C1_SEED", "42"))
          corpus   = os.environ.get("C1_CORPUS", f"artifacts/synthetic/c1_corpus_n100000_seed{seed}.json")
          out_dir  = Path(os.environ.get("C1_OUTPUT_DIR", "artifacts/models"))
          out_dir.mkdir(parents=True, exist_ok=True)

          print(f"Loading corpus: {corpus}")
          with open(corpus) as f:
              records = json.load(f)
          print(f"Loaded {len(records)} records. Starting {n_epochs}-epoch training...")

          config = TrainingConfig(
              n_epochs=n_epochs,
              batch_size=256,
              learning_rate=1e-3,
              alpha=0.7,
              val_split=0.2,
              random_seed=seed,
          )
          t0 = time.time()
          pipeline = TrainingPipeline(config)
          model, threshold, emb_pipeline = pipeline.run(records)
          elapsed = time.time() - t0

          # Save artifacts
          with open(out_dir / "c1_model.pkl", "wb") as f: pickle.dump(model, f)
          (out_dir / "c1_threshold.txt").write_text(f"{threshold:.6f}\n")
          with open(out_dir / "c1_embeddings.pkl", "wb") as f: pickle.dump(emb_pipeline, f)

          report = {
              "component": "C1", "status": "ok",
              "n_records": len(records), "n_epochs": n_epochs,
              "threshold": round(float(threshold), 6),
              "training_seconds": round(elapsed, 2),
          }
          with open(out_dir / "c1_training_report.json", "w") as f:
              json.dump(report, f, indent=2)

          print(f"\nDone — threshold={threshold:.4f}  elapsed={elapsed:.0f}s ({elapsed/3600:.2f}h)")
          print(json.dumps(report, indent=2))
          EOF

      - name: Run C1 full training
        env:
          PYTHONPATH: ${{ github.workspace }}
          C1_N_EPOCHS: ${{ github.event.inputs.n_epochs }}
          C1_SEED: ${{ github.event.inputs.seed }}
          C1_CORPUS: artifacts/synthetic/c1_corpus_n100000_seed${{ github.event.inputs.seed }}.json
          C1_OUTPUT_DIR: artifacts/models
        run: python /tmp/run_c1_train.py

      - name: Verify artifacts
        run: |
          echo "=== Artifacts produced ==="
          ls -lh artifacts/models/c1_* 2>/dev/null || echo "WARNING: no C1 artifacts found"
          cat artifacts/models/c1_training_report.json 2>/dev/null

      - name: Upload model artifacts
        uses: actions/upload-artifact@v4
        if: always()   # upload even if training timed out (partial artifacts useful)
        with:
          name: c1-model-${{ github.event.inputs.n_epochs }}epochs-seed${{ github.event.inputs.seed }}
          path: |
            artifacts/models/c1_model.pkl
            artifacts/models/c1_threshold.txt
            artifacts/models/c1_embeddings.pkl
            artifacts/models/c1_training_report.json
          retention-days: 30
